services:
  - type: web
    name: react-movie-app
    env: static
    rootDir: movie
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_KEY
        sync: false # You will enter this manually in the Render dashboard
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
